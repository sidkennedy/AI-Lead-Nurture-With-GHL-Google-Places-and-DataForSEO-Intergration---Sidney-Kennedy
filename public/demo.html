<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loading Visibility Report…</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#111827;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.wave{display:flex;gap:5px}
.wave span{width:5px;height:24px;background:#F59E0B;border-radius:3px;animation:w 1s ease-in-out infinite}
.wave span:nth-child(2){animation-delay:.1s}
.wave span:nth-child(3){animation-delay:.2s}
.wave span:nth-child(4){animation-delay:.3s}
.wave span:nth-child(5){animation-delay:.4s}
@keyframes w{0%,100%{transform:scaleY(.4);opacity:.5}50%{transform:scaleY(1);opacity:1}}
p{font-size:14px;color:#9CA3AF}
</style>
</head>
<body>
<div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
<p id="msg">Starting scan for Doc Side Audiology…</p>
<script>
async function run() {
  const s = await fetch('/api/start', {method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(r=>r.json());
  const sid = s.sessionId;
  await fetch('/api/session/update', {method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({sessionId:sid, practiceName:'Doc Side Audiology', city:'Sarasota FL', currentStep:'onboarding-3'})});
  document.getElementById('msg').textContent = 'Running scan… (~8 sec)';
  await poll(sid);
}
async function poll(sid) {
  const d = await fetch('/api/scan/data/' + sid).then(r=>r.json()).catch(()=>({}));
  if (d.scanStatus === 'complete' && d.lat) {
    location.href = '/scan-card.html?session=' + sid;
  } else {
    setTimeout(() => poll(sid), 1500);
  }
}
run();
</script>
</body>
</html>
